# CI for ai-observability-sdk — the contract tests are the merge gate.
# Adapt triggers/runners to your internal CI (Harness/Jenkins/GitHub Actions syntax shown).
name: ai-observability-sdk

on:
  pull_request:
    paths: ["ai-observability-sdk/**"]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-observability-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check ai_obs_sdk tests
      - name: Contract gate — schema must match observability-iac
        run: pytest tests/test_contract.py -v
      - name: Unit tests
        run: pytest -v
      - name: Contract drift check
        # Fails if the vendored contract diverges from the IaC source of truth.
        run: |
          for f in event_schema.py event_types.py service_names.py; do
            diff ai_obs_sdk/contracts/$f ../observability-iac/contracts/$f \
              || { echo "::error::vendored contract $f drifted from observability-iac"; exit 1; }
          done
