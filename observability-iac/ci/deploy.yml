# observability-iac CI — validate, then apply per environment.
# GitHub Actions syntax; port triggers/secrets to Harness/Jenkins as needed.
name: observability-iac

on:
  pull_request:
    paths: ["observability-iac/**", "ai-observability-sdk/ai_obs_sdk/contracts/**"]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: observability-iac } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements-dev.txt
      - name: Contract tests
        run: pytest contracts/tests -v
      - name: Policy gate (Phase 0 <-> Phase 1 compatibility)
        run: pytest tests/test_policy.py -v
      - name: Shell syntax
        run: bash -n kafka/create_topics.sh postgres/apply.sh postgres-events/apply.sh elasticsearch/apply.sh s3/apply.sh
      - name: SQL dry-run against ephemeral Postgres
        run: |
          docker run -d --name pg -p 5432:5432 -e POSTGRES_PASSWORD=obs postgres:16
          until docker exec pg pg_isready -U postgres; do sleep 1; done
          PGURL=postgres://postgres:obs@localhost:5432/postgres ./postgres/apply.sh --with-seed
          PGURL=postgres://postgres:obs@localhost:5432/postgres ./postgres-events/apply.sh

  apply-dev:
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    defaults: { run: { working-directory: observability-iac } }
    steps:
      - uses: actions/checkout@v4
      - name: Apply Kafka topics
        run: BOOTSTRAP=${{ secrets.KAFKA_BOOTSTRAP_DEV }} COMMAND_CONFIG=client.properties ./kafka/create_topics.sh
      - name: Apply Postgres (control plane + events)
        run: |
          PGURL=${{ secrets.PGURL_DEV }} ./postgres/apply.sh --with-seed
          PGURL=${{ secrets.PGURL_DEV }} ./postgres-events/apply.sh
      - name: Apply Elasticsearch templates
        run: ES_URL=${{ secrets.ES_URL_DEV }} ES_AUTH=${{ secrets.ES_AUTH_DEV }} ./elasticsearch/apply.sh
      - name: Apply S3
        run: BUCKET=ai-obs-archive-dev KMS_KEY_ID=${{ secrets.OBS_KMS_KEY_DEV }} ./s3/apply.sh
      - name: Export dashboard IaC snapshot
        run: aws s3 sync infra/ s3://ai-obs-archive-dev/iac-dashboards/$(date +%Y%m%d)/

  # apply-staging / apply-prod: same steps, environment-gated approvals.
